name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Windows installers
        run: npm run dist:win

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem dist -File | Where-Object { $_.Extension -in '.exe', '.msi', '.blockmap', '.yml' } | ForEach-Object FullName
          gh release create $env:GITHUB_REF_NAME @assets --repo $env:GITHUB_REPOSITORY --title "Jungle Display Studio $env:GITHUB_REF_NAME" --generate-notes --verify-tag